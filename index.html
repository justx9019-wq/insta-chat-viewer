<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عارض محادثات إنستغرام الشامل</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            margin: 0; 
            padding: 0; 
        }
        .app-container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #dbdbdb; 
            border-right: 1px solid #dbdbdb; 
            position: relative;
        }
        .header { 
            padding: 15px; 
            border-bottom: 1px solid #dbdbdb; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: white; 
            z-index: 10; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .header h2 { 
            margin: 0; 
            font-size: 18px; 
            text-align: center; 
            color: #262626;
        }
        .controls { 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        .controls input[type="text"] { 
            flex: 1; 
            padding: 10px 15px; 
            border: 1px solid #dbdbdb; 
            border-radius: 20px; 
            outline: none; 
            font-size: 14px;
        }
        
        #fileInput { display: none; }
        .upload-btn { 
            background: #0095f6; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            white-space: nowrap;
        }
        .upload-btn:hover { background: #1877f2; }

        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background-color: #ffffff;
            scroll-behavior: smooth; /* لتمرير سلس */
        }
        .message-wrapper { 
            display: flex; 
            flex-direction: column; 
            max-width: 75%; 
        }
        .message-wrapper.me { align-self: flex-start; }
        .message-wrapper.them { align-self: flex-end; }
        
        .message { 
            padding: 12px 16px; 
            border-radius: 22px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-wrap: break-word; 
        }
        .me .message { background-color: #3797f0; color: white; border-bottom-right-radius: 4px; }
        .them .message { background-color: #efefef; color: black; border-bottom-left-radius: 4px; }
        
        .time { font-size: 11px; color: #8e8e8e; margin-top: 5px; }
        .me .time { text-align: left; margin-left: 5px; }
        .them .time { text-align: right; margin-right: 5px; }
        
        .date-divider { 
            text-align: center; 
            font-size: 12px; 
            color: #8e8e8e; 
            margin: 25px 0 15px 0; 
            font-weight: bold;
        }

        /* زر الذهاب للأعلى/لأول رسالة */
        .scroll-top-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #262626;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none; /* مخفي افتراضياً حتى يتم تحميل الرسائل */
            z-index: 100;
        }
        .scroll-top-btn:hover { background: #000; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h2 id="chatTitle">أرشيف المحادثة الكامل</h2>
            <div class="controls">
                <label for="fileInput" class="upload-btn">📁 اختر ملفات المحادثة</label>
                <input type="file" id="fileInput" accept=".html" multiple>
                <input type="text" id="searchInput" placeholder="ابحث في جميع الملفات...">
            </div>
            <div id="statusText" style="font-size:12px; color:#888; text-align:center;">لم يتم تحديد ملفات بعد. (يرجى اختيار الملفات الثلاثة معاً)</div>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div style="text-align: center; color: #888; margin-top: 50px; line-height: 2;">
                يرجى الضغط على زر "اختر ملفات المحادثة"<br>وتحديد كل ملفات الـ HTML الخاصة بالمحادثة (يمكنك تحديدها دفعة واحدة).
            </div>
        </div>

        <button class="scroll-top-btn" id="scrollTopBtn">⬆️ الذهاب للرسالة الأولى</button>
    </div>

    <script>
        let allMessages = [];
        const myUsername = "upinthehellof";

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            document.getElementById('statusText').innerText = `جاري معالجة ${files.length} ملفات... يرجى الانتظار.`;
            document.getElementById('chatBox').innerHTML = '<div style="text-align:center; margin-top:50px; color:#888;">جاري دمج وتحليل البيانات...</div>';
            document.getElementById('scrollTopBtn').style.display = 'none';
            
            allMessages = []; // تفريغ المصفوفة في حال رفع ملفات جديدة

            // قراءة جميع الملفات المحددة
            for (const file of files) {
                const text = await file.text();
                parseHTML(text);
            }

            // ترتيب زمني تصاعدي (من الأقدم للأحدث دائماً)
            allMessages.sort((a, b) => a.dateObj - b.dateObj);
            
            renderMessages(allMessages);
            document.getElementById('statusText').innerText = `تم دمج وترتيب ${allMessages.length} رسالة بنجاح.`;
        });

        function parseHTML(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');

            const messageDivs = doc.querySelectorAll('.pam._3-95._2ph-._a6-g.uiBoxWhite.noborder');

            messageDivs.forEach(div => {
                const senderEl = div.querySelector('h2');
                if(!senderEl) return;
                const sender = senderEl.innerText.trim();
                
                let content = '';
                const textSpan = div.querySelector('div._3-95._a6-p span');
                if (textSpan) content = textSpan.innerText;

                const timeText = div.querySelector('div._3-94._a6-o').innerText.trim();
                const dateObj = new Date(timeText);

                if(content !== '') {
                    allMessages.push({
                        sender: sender,
                        content: content,
                        dateObj: dateObj
                    });
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                renderMessages(allMessages);
                return;
            }
            const filtered = allMessages.filter(m => m.content && m.content.toLowerCase().includes(term));
            renderMessages(filtered);
        });

        function renderMessages(messagesToRender) {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';
            
            if(messagesToRender.length === 0) {
                chatBox.innerHTML = '<div style="text-align:center; margin-top:50px; color:#888;">لا توجد رسائل.</div>';
                return;
            }

            let lastDate = '';

            messagesToRender.forEach(msg => {
                const msgDate = msg.dateObj.toLocaleDateString('ar-IQ', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
                if (msgDate !== lastDate) {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-divider';
                    dateDiv.innerText = msgDate;
                    chatBox.appendChild(dateDiv);
                    lastDate = msgDate;
                }

                const wrapper = document.createElement('div');
                const isMe = msg.sender === myUsername;
                wrapper.className = `message-wrapper ${isMe ? 'me' : 'them'}`;

                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerText = msg.content;

                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.innerText = msg.dateObj.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute:'2-digit' });

                wrapper.appendChild(msgDiv);
                wrapper.appendChild(timeDiv);
                chatBox.appendChild(wrapper);
            });

            // إظهار زر "الذهاب للرسالة الأولى" بعد تحميل الرسائل
            document.getElementById('scrollTopBtn').style.display = 'block';
        }

        // تفعيل زر الذهاب لأول رسالة
        document.getElementById('scrollTopBtn').addEventListener('click', () => {
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
</body>
</html>
